# =============================================
# CONFIGURACION DEL SERVIDOR
# =============================================
server.port=8080

# =============================================
# CONEXION A MYSQL (XAMPP)
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_online?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
# validate = verifica que las tablas existan pero NO las modifica
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# =============================================
# MENSAJES DE ERROR
# =============================================
spring.mvc.hiddenmethod.filter.enabled=true
server.error.include-message=always